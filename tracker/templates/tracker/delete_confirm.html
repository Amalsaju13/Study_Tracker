{% extends "tracker/base.html" %}

{% block content %}

<div class="card p-4 shadow-sm">

    <h3>Delete Study Entry</h3>

    <p>Are you sure you want to delete <strong>{{ entry.topic }}</strong>?</p>

    <form method="POST">

        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Delete
        </button>

        <a href="/entry/{{ entry.id }}/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
