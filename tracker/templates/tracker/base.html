<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Tracker</title>
</head>
<body>

<!DOCTYPE html>

<html>
<head>
    <title>Study Tracker</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
        }
    </style>


</head>

<body>

<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">📚 Study Tracker</a>

        <!-- Right side -->

        <div class="d-flex align-items-center gap-3">

            <!-- Avatar -->
            <div style="
                width:35px;
                height:35px;
                border-radius:50%;
                background:#0d6efd;
                color:white;
                display:flex;
                align-items:center;
                justify-content:center;
                font-weight:bold;
            ">
                {{ user.username|first|upper }}
            </div>

            <!-- Username -->
            <strong>{{ user.username }}</strong>

        <div>

            <a href="/logout/" class="btn btn-outline-warning">Logout</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>

</body>
</html>
